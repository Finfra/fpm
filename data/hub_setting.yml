# htm Hub 설정 — server.py 가 기동 시 + 파일 mtime 변경 시 재로드
# 활동 피드 패널 (Issue42). flat key:value 만 — server.py stdlib-only 경량 파서.
feed_limit: 300            # 피드 보관·표시 최대 항목 수 (deque maxlen)
feed_default_visible: true # 사이드바 최초 표시 여부 (런타임 토글은 localStorage)
feed_poll_interval: 5      # 참고값 — 현재 /dashboards 폴링(5s)에 편승, 향후 분리 시 사용
feed_show_project_emoji: true # 활동 피드 항목에 프로젝트 이모지 표시 (Issue47)
feed_show_project_name: false  # 활동 피드 항목에 프로젝트명 표시 (Issue47)
card_limit: 200             # htm 문서 카드 최대 표시 수 — mtime 최신순 (Issue52). 0 이면 무제한
search_limit: 200          # 디스크 재스캔 시 디렉토리당 처리 파일 수 상한 — 파일명 unixtime 최신순 (Issue55). 0 이면 무제한
live_session_limit: 6      # 활성 세션 카드(프로젝트 그룹)당 최대 세션 행 수 — 초과 시 마지막 행에 "외 N개 더" (Issue129). 0 이면 무제한

# hub/htm 렌더 브라우저 open 동작 (Issue128/130) — 글로벌 hook 이 본 키를 grep 하여 분기 (server.py 미사용)
#   소비처: ~/.claude/hooks/hub-{trigger,marker-detect,ask-intercept}.sh
#
# browser_focus — 렌더 시 브라우저로 포커스를 가져갈지
#   false(기본) = 포커스 미탈취. `open -g`(백그라운드) — 다른 앱 입력 중 끼어들어 입력이 끊기는 문제 방지
#   true        = foreground (브라우저로 포커스 가져감)
browser_focus: false
#
# default_browser — 렌더에 사용할 브라우저
#   firefox(기본) / chrome / edge / safari  (지원 타입 — app 명으로 매핑)
#   그 외 값은 .app 절대 경로로 해석 (ex: default_browser: "/Applications/Brave Browser.app")
#   매핑: firefox→Firefox, chrome→Google Chrome, edge→Microsoft Edge, safari→Safari
default_browser: firefox

# bind_host (Issue141) — hub 서버가 listen 할 인터페이스. server.py 가 기동 시 읽음.
#   127.0.0.1(기본) = 루프백 전용, 외부 차단. 같은 머신에서만 접근.
#   0.0.0.0          = 모든 인터페이스 개방 → 원격 머신에서 접근 가능.
#     ⚠️ 개방 시 Servers.md 의 check=O 호스트 IP 만 allowlist 통과(그 외 source IP 는 403).
#     ⚠️ Servers.md 의 공개 호스트(finfra.iptime.org·finfr.kr)는 공개 IP 가 allowlist 에 들어감 —
#        LAN 전용으로 제한하려면 해당 행 check 를 X 로 두거나 사설망 IP(192.168.*) 호스트만 O 유지.
#   우선순위: env HTM_SERVER_HOST > 본 bind_host > 기본 127.0.0.1.
#   변경 후 `/dashboard-server restart` 로 재기동해야 적용됨.
bind_host: 127.0.0.1

# render_target (Issue153) — ..show / hub 자동 렌더의 "보여주는 경로" 를 결정.
#   글로벌 hook(~/.claude/hooks/fpm-hub-trigger.sh)이 본 키를 grep 하여 분기 (server.py 미사용).
#   소비처(hook 분기 로직)는 글로벌 ~/.claude/Issue.md Issue141 에서 구현 — 본 키는 데이터 SSOT(자리 선점).
#
#   목적: 이 한 줄로 모든 ..show 가 어떻게 표시될지 일괄 전환. (개별 SCAR 수정 없이 hook 한 곳이 적용)
#
#   local-open(기본) = file://<절대경로> 를 브라우저로 직접 open. 현행 동작. 같은 머신에서만 열람.
#   hub             = hub 서버 경유 → http://<advertise_host>:9876/view?path=<절대경로> 로 표시.
#                     로컬·원격(SSH)·타 기기 모두 hub 서버 한 곳을 통해 도달. 원격 실접근은 bind_host 개방 전제.
#   both            = 로컬 open + hub URL 동시 (브라우저 표시 + 채팅에 URL 병기)
#
#   ⚠️ bind_host 와는 별개 축: render_target=출력 경로(hook 소비) / bind_host=서버 수신 게이트(server.py 소비).
#      render_target: hub 라도 원격 머신에서 열려면 bind_host: 0.0.0.0 (+ Servers.md allowlist) 가 전제 — 조합 의존.
render_target: hub

# advertise_host (Issue153) — render_target: hub|both 일 때 URL 에 박을 호스트. **optional(생략 가능)**.
#   적용 규칙 (Issue153 — 사용자 결정):
#     - render_target: local-open → URL 미사용(file:// 직접 open). advertise_host·bind_host 둘 다 생략 가능.
#                                   (bind_host 는 hub 서버 listen 용도로만 의미 — 생략 시 서버 기본 127.0.0.1)
#     - render_target: hub|both   → advertise_host 명시 시 그 값을 URL host 로. **생략 시 bind_host 값으로 fallback**.
#   값: 127.0.0.1(로컬) / LAN IP(192.168.x.x) / 도메인(finfra.iptime.org).
#   ⚠️ 생략 + bind_host: 0.0.0.0 조합 금지 — URL 이 http://0.0.0.0 이 되어 브라우저 접속 불가.
#      0.0.0.0 으로 열 때는 advertise_host 를 구체 IP·도메인으로 반드시 명시.
# advertise_host: 192.168.1.5   # 원격 LAN 접근 시 주석 해제. 현재는 생략 → bind_host(127.0.0.1) fallback → 로컬 hub 경유
